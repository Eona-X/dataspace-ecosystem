stages:
  - compile
  - verify
  - package
  - deploy
  - promote-uat
  - promote-ppr
  - promote-prd

.gradle:
  image: ${REGISTRY_HOST}/${REGISTRY_NS_TOOLS}/gradle:8.8.0-jdk17-jammy
  variables:
    GRADLE_USER_HOME: "$CI_PROJECT_DIR/cache"
  cache:
    key:
      files:
        - gradle/wrapper/gradle-wrapper.properties
    paths:
      - cache/caches/
      - cache/notifications/
      - cache/wrapper/
  interruptible: true

.deploy-argocd:
  stage: deploy
  image: alpine:latest
  needs: [docker-build-push]
  before_script:
    - apk add --no-cache git yq
  script:
    - |
      git config --global user.name "${GITLAB_USER}"
      git config --global user.email "${GITLAB_USER}@eona-x.eu"
      git config --global --add credential.helper "store --file ./.git-credentials"
      echo "https://${GITLAB_USER}:${GITLAB_TOKEN}@${GITLAB_HOST}" > ./.git-credentials
      git config --global http.sslVerify false
      git clone "https://${GITLAB_USER}:${GITLAB_TOKEN}@${GITLAB_HOST}/eona-x/data-space/argocd-deployments.git" argocd-repo
      cd argocd-repo
      git fetch origin
      git checkout ${DEPLOY_ENV} || git checkout -b ${DEPLOY_ENV} origin/${DEPLOY_ENV}
      git pull origin ${DEPLOY_ENV}
      for f in $(grep -rl "eona-x/dse" values/ --exclude="dataspace-ui-values.yaml"); do
        yq e -i '(.. | select(type == "!!map" and has("repository") and has("tag")) | .tag) = strenv(DEPLOY_TAG)' "$f"
      done
      git add values/
      git commit -m "deploy: ${DEPLOY_ENV} -> ${DEPLOY_TAG}" || echo "No changes to commit."
      git remote set-url origin "https://${GITLAB_USER}:${GITLAB_TOKEN}@${GITLAB_HOST}/eona-x/data-space/argocd-deployments.git"
      while true; do
        if git push origin HEAD:${DEPLOY_ENV}; then
          break
        else
          echo "Push failed, rebasing..."
          git pull --rebase origin ${DEPLOY_ENV} || exit 1
        fi
      done

.deploy-argocd-mr:
  stage: deploy
  image: alpine:latest
  needs: [docker-build-push]
  before_script:
    - apk add --no-cache git yq curl
  script:
    - |
      MR_BRANCH="deploy_${DEPLOY_ENV}"
      PROJECT_PATH="eona-x%2Fdata-space%2Fargocd-deployments"
      git config --global user.name "${GITLAB_USER}"
      git config --global user.email "${GITLAB_USER}@eona-x.eu"
      git config --global --add credential.helper "store --file ./.git-credentials"
      echo "https://${GITLAB_USER}:${GITLAB_TOKEN}@${GITLAB_HOST}" > ./.git-credentials
      git config --global http.sslVerify false
      git clone "https://${GITLAB_USER}:${GITLAB_TOKEN}@${GITLAB_HOST}/eona-x/data-space/argocd-deployments.git" argocd-repo
      cd argocd-repo
      git fetch origin
      git checkout -B "${MR_BRANCH}" "origin/${DEPLOY_ENV}"
      for f in $(grep -rl "eona-x/dse" values/ --exclude="dataspace-ui-values.yaml"); do
        yq e -i '(.. | select(type == "!!map" and has("repository") and has("tag")) | .tag) = strenv(DEPLOY_TAG)' "$f"
      done
      git add values/
      if git diff --cached --quiet; then
        echo "No changes to commit."
        exit 0
      fi
      git commit -m "deploy: ${DEPLOY_ENV} -> ${DEPLOY_TAG}"
      git push --force "https://${GITLAB_USER}:${GITLAB_TOKEN}@${GITLAB_HOST}/eona-x/data-space/argocd-deployments.git" "HEAD:${MR_BRANCH}"
      EXISTING_MR=$(curl -s --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        "https://${GITLAB_HOST}/api/v4/projects/${PROJECT_PATH}/merge_requests?state=opened&source_branch=${MR_BRANCH}&target_branch=${DEPLOY_ENV}" \
        | yq e '.[0].iid' -)
      if [ "${EXISTING_MR}" = "null" ] || [ -z "${EXISTING_MR}" ]; then
        curl -s --request POST --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
          "https://${GITLAB_HOST}/api/v4/projects/${PROJECT_PATH}/merge_requests" \
          --data-urlencode "source_branch=${MR_BRANCH}" \
          --data-urlencode "target_branch=${DEPLOY_ENV}" \
          --data-urlencode "title=deploy: ${DEPLOY_ENV} -> ${DEPLOY_TAG}" \
          --data-urlencode "remove_source_branch=true" \
          | yq e '"Merge request created: " + .web_url' -
      else
        echo "Merge request already open: !${EXISTING_MR}"
      fi

compile:
  extends: .gradle
  stage: compile
  script:
    - ./gradlew classes testClasses --build-cache
  cache:
    policy: pull-push
  artifacts:
    paths:
      - "**/build/classes/"
      - "**/build/resources/"
      - "**/build/generated/"
    expire_in: 1 hour
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/

unit-tests:
  extends: .gradle
  stage: verify
  needs: [compile]
  cache:
    policy: pull
  script:
    - ./gradlew test --build-cache --init-script unit-tests.gradle
  artifacts:
    when: always
    paths:
      - "**/build/reports/tests/"
    reports:
      junit:
        - "**/build/test-results/test/TEST-*.xml"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/

integration-tests:
  extends: .gradle
  stage: verify
  needs: [compile]
  services:
    - name: ${REGISTRY_DIND_IMAGE}
      alias: docker
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  cache:
    policy: pull
  script:
    - ./gradlew test --build-cache --init-script integration-tests.gradle
  artifacts:
    when: always
    paths:
      - "**/build/reports/tests/"
    reports:
      junit:
        - "**/build/test-results/test/TEST-*.xml"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/

openapi-doc:
  extends: .gradle
  stage: verify
  needs: [compile]
  variables:
    GRADLE_USER_HOME: "$CI_PROJECT_DIR/cache"
  script:
    - |
      ./gradlew \
       extensions:agreements:retirement-evaluation-api:openapi \
       extensions:control-plane:control-plane-federated-catalog-filter:openapi \
       extensions:data-plane:data-plane-public-api-v2:openapi \
       extensions:federated-catalog:filter:openapi \
       extensions:issuer-service:domain-attestation-api:openapi \
       extensions:issuer-service:membership-attestation-api:openapi \
       extensions:telemetry-csv-manager:telemetry-csv-manager-api:openapi \
       extensions:telemetry-service:telemetry-service-credential-api:openapi \
       extensions:telemetry-storage:telemetry-storage-api:openapi
    - find extensions -path '*/build/docs/openapi/*.yaml' -exec sh -c \
      'cp "$1" "resources/openapi/yaml/$(basename $(dirname $(dirname $(dirname $(dirname $1)))))/"' _ {} \;
    - ./gradlew autodoc mergeApiSpec
  cache:
    policy: pull
  artifacts:
    paths:
      - resources/openapi/openapi.yaml
    expire_in: 90 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_REF_NAME == "main"
    - if: $CI_COMMIT_REF_NAME == "dev"

checkstyle:
  extends: .gradle
  stage: verify
  needs: [compile]
  cache:
    policy: pull
  script:
    - ./gradlew checkstyleMain checkstyleTest --build-cache
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      allow_failure: false
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "dev"

shadow-jar:
  extends: .gradle
  stage: verify
  needs: [compile]
  cache:
    policy: pull
  script:
    - ./gradlew shadowJar --build-cache
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/

docker-build-push:
  extends: .gradle
  stage: package
  services:
    - name: ${REGISTRY_DIND_IMAGE}
      alias: docker
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
    DOCKER_CONFIG: "./gradle"
  cache:
    policy: pull
  needs:
    - job: unit-tests
    - job: integration-tests
    - job: shadow-jar
  script:
    - echo $DOCKER_AUTH_CONFIG_DEV > ./gradle/config.json
    - |
      ./gradlew shadowJar dockerize dockerPush \
        --build-cache \
        -PimageTag="${IMAGE_TAG}" \
        -PregistryHost="${REGISTRY_HOST}" \
        -PregistryNs=eona-x/dse \
        -Pdocker.registry="${REGISTRY_HOST}/eona-x/dse" \
        -Pdocker.image.tag="${IMAGE_TAG}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      variables:
        IMAGE_TAG: latest
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/
      variables:
        IMAGE_TAG: $CI_COMMIT_TAG

deploy-dev:
  extends: .deploy-argocd
  environment:
    name: dev
  variables:
    DEPLOY_ENV: dev
    DEPLOY_TAG: $CI_COMMIT_TAG
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/
      when: manual

promote-uat:
  extends: .deploy-argocd-mr
  stage: promote-uat
  environment:
    name: uat
  variables:
    DEPLOY_ENV: uat
    DEPLOY_TAG: $CI_COMMIT_TAG
  needs:
    - job: docker-build-push
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/
      when: manual

promote-ppr:
  extends: .deploy-argocd-mr
  stage: promote-ppr
  environment:
    name: ppr
  variables:
    DEPLOY_ENV: ppr
    DEPLOY_TAG: $CI_COMMIT_TAG
  needs:
    - job: docker-build-push
    - job: promote-uat
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/
      when: manual

promote-prd:
  extends: .deploy-argocd-mr
  stage: promote-prd
  environment:
    name: prd
  variables:
    DEPLOY_ENV: prd
    DEPLOY_TAG: $CI_COMMIT_TAG
  needs:
    - job: docker-build-push
    - job: promote-ppr
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/
      when: manual